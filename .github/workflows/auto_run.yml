name: Auto Wake Hugging Face Spaces

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  wake_spaces:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Auto Wake Hugging Face Spaces
        shell: bash
        env:
          # This pulls your secure token from GitHub Secrets
          HF_TOKEN: ${{ secrets.HF_TOKEN }} 
        run: |
          set -e

          SPACES=(
            "https://kacapower-blogger-source-downloader.hf.space/"
            "https://kacapower-collabrative-study-space.hf.space/"
            
            "https://kacapower-backend-filehandler.hf.space/"
            "https://kacapower-Docker.hf.space/"
            "https://kacapower-a1-frnt.hf.space/"
            "https://kacapower-a1-bck.hf.space/"
            "https://kacapower-temp-mail-api.hf.space/"
            "https://kacapower-backend-music.hf.space/" # Your private space added here
          )

          USER_AGENT="Mozilla/5.0 (X11; Linux x86_64) GitHubActions-HF-Waker"

          for SPACE in "${SPACES[@]}"; do
            echo "Waking: $SPACE"

            # Added the Authorization header to bypass private space security
            HTTP_CODE=$(curl -L \
              -A "$USER_AGENT" \
              -H "Authorization: Bearer $HF_TOKEN" \
              --max-time 20 \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              "$SPACE" || echo "000")

            echo "Status: $HTTP_CODE"
            sleep 15
          done
