name: Daily Funzone Q&A Engine
env:
  # Forces actions to use Node 24 to prevent deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Runs at exactly 22:30 UTC, which is 4:00 AM IST
    - cron: '30 22 * * *'
  workflow_dispatch: # Enables the manual "Run workflow" button

jobs:
  gemini-sync-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas datasets huggingface_hub pytz google-generativeai
          
      - name: Execute LLM Extraction & Hub Sync
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python cron_script.py
