name: Daily Funzone Q&A Scraper
on:
  schedule:
    # 22:30 UTC is exactly 4:00 AM IST
    - cron: '30 22 * * *'
  workflow_dispatch: # Gives you a manual "Run Workflow" button in GitHub just in case

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas requests beautifulsoup4 datasets huggingface_hub pytz
      - name: Run Scraper Script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # Ensure you add this in GitHub Repo Settings -> Secrets
        run: python cron_script.py
